name: Build Release

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 14:00 UTC (22:00 CST) check PT for changes
  workflow_dispatch:
    inputs:
      force:
        description: '强制发布（跳过变更检测）'
        type: boolean
        default: true
      version:
        description: 'DJ2 版本号（留空则使用 .last_synced_version）'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull translations from ParaTranz
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: |
          python scripts/paratranz_sync.py download

      - name: Update I18nUpdateMod
        run: |
          python scripts/paratranz_sync.py update-i18n-mod

      - name: Compute current build hash
        run: |
          {
            find resources -type f -name 'zh_cn.lang' -print0 | sort -z | xargs -0 -r sha256sum
            find mods -type f -name '*.jar' -print0 | sort -z | xargs -0 -r sha256sum
            find resourcepacks -type f -print0 | sort -z | xargs -0 -r sha256sum
            find igi -type f -print0 | sort -z | xargs -0 -r sha256sum
            [ -f 说明.txt ] && sha256sum 说明.txt
          } > current-build.sha256
          echo "Current manifest ($(wc -l < current-build.sha256) files):"
          head -5 current-build.sha256

      - name: Restore last-build hash cache
        uses: actions/cache/restore@v4
        with:
          path: .last-build.sha256
          key: release-build-hash-
          restore-keys: |
            release-build-hash-

      - name: Compare with last build
        id: diff
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif [ -f .last-build.sha256 ] && cmp -s current-build.sha256 .last-build.sha256; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No build changes since last release — skipping."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            if [ -f .last-build.sha256 ]; then
              echo "Build changes detected since last release:"
              diff .last-build.sha256 current-build.sha256 || true
            else
              echo "No prior build cache found — first release."
            fi
          fi

      - name: Determine version tag
        if: steps.diff.outputs.changed == 'true'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            DJ2_VER="${{ github.event.inputs.version }}"
            echo "Using manually provided version: ${DJ2_VER}"
          else
            DJ2_VER=$(cat .last_synced_version | tr -d '[:space:]')
            echo "Using .last_synced_version: ${DJ2_VER}"
          fi

          # Find next zh version number for this DJ2 version
          EXISTING=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null | grep "^${DJ2_VER}-zh-" | sed "s/${DJ2_VER}-zh-//" | sort -n | tail -1)
          if [ -z "$EXISTING" ]; then
            ZH_VER=1
          else
            ZH_VER=$((EXISTING + 1))
          fi

          TAG="${DJ2_VER}-zh-${ZH_VER}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "dj2_version=${DJ2_VER}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Package 汉化压缩包
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p build-zh/resources build-zh/resourcepacks build-zh/mods

          for dir in resources/*/lang; do
            mod=$(basename $(dirname "$dir"))
            if [ -f "$dir/zh_cn.lang" ]; then
              mkdir -p "build-zh/resources/$mod/lang"
              cp "$dir/zh_cn.lang" "build-zh/resources/$mod/lang/"
            fi
          done

          shopt -s nullglob
          zips=(resourcepacks/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "Error: no .zip files found in resourcepacks/ — manually upload at least one." >&2
            exit 1
          fi
          for z in "${zips[@]}"; do
            cp "$z" build-zh/resourcepacks/
            echo "  included: $(basename "$z")"
          done

          cp mods/I18nUpdateMod-*.jar build-zh/mods/
          cp 说明.txt build-zh/

          cd build-zh
          zip -r "../DJ2-汉化-${TAG}.zip" .
          cd ..

      - name: Package IGI 配置压缩包
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p build-igi/config build-igi/mods

          cp -r igi/config/* build-igi/config/
          cp igi/mods/* build-igi/mods/
          cp igi/注意事项.txt build-igi/

          cd build-igi
          zip -r "../DJ2-IGI配置-${TAG}.zip" .
          cd ..

      - name: Create Release
        if: steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DJ2 汉化 ${{ steps.version.outputs.tag }}"
          body: |
            ## DJ2 汉化补丁 ${{ steps.version.outputs.tag }}
            基于 Divine Journey 2 `${{ steps.version.outputs.dj2_version }}` 版本

            ### 汉化压缩包
            包含：resources 翻译文件、资源包补丁、i18n 自动汉化模组。

            使用方法：
            1. 解压到游戏整合包版本文件夹覆盖
            2. 进入游戏加载资源包（补汉材质包放在 i18n 材质包下面）

            ### IGI 配置压缩包
            InGameInfo 屏幕信息显示配置，包含血魔法、RF维度、神秘扭曲等显示。

            使用方法：解压到整合包目录覆盖。

            ---
            翻译协作平台：https://paratranz.cn/projects/15018
          files: |
            DJ2-汉化-${{ steps.version.outputs.tag }}.zip
            DJ2-IGI配置-${{ steps.version.outputs.tag }}.zip

      - name: Save build hash to cache
        if: steps.diff.outputs.changed == 'true'
        run: cp current-build.sha256 .last-build.sha256

      - name: Persist last-build hash cache
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .last-build.sha256
          key: release-build-hash-${{ github.run_id }}

      - name: Cleanup old releases (keep latest 3)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | \
          while read -r tag; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
