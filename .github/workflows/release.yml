name: Build Release

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 14:00 UTC (22:00 CST) check PT for changes
  workflow_dispatch:
    inputs:
      force:
        description: '强制发布（跳过变更检测）'
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull translations from ParaTranz
        env:
          PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
        run: |
          python scripts/paratranz_sync.py download

      - name: Check for changes
        id: diff
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif git diff --quiet resources/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No translation changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Translation changes detected:"
            git diff --stat resources/
          fi

      - name: Update I18nUpdateMod
        if: steps.diff.outputs.changed == 'true'
        run: |
          python scripts/paratranz_sync.py update-i18n-mod

      - name: Determine version tag
        if: steps.diff.outputs.changed == 'true'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DJ2_VER=$(cat .last_synced_version | tr -d '[:space:]')

          # Find next zh version number for this DJ2 version
          EXISTING=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null | grep "^${DJ2_VER}-zh-" | sed "s/${DJ2_VER}-zh-//" | sort -n | tail -1)
          if [ -z "$EXISTING" ]; then
            ZH_VER=1
          else
            ZH_VER=$((EXISTING + 1))
          fi

          TAG="${DJ2_VER}-zh-${ZH_VER}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "dj2_version=${DJ2_VER}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Package 汉化压缩包
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p build-zh/resources build-zh/resourcepacks build-zh/mods

          for dir in resources/*/lang; do
            mod=$(basename $(dirname "$dir"))
            if [ -f "$dir/zh_cn.lang" ]; then
              mkdir -p "build-zh/resources/$mod/lang"
              cp "$dir/zh_cn.lang" "build-zh/resources/$mod/lang/"
            fi
          done

          cd resourcepacks/补汉材质包
          zip -r "../../build-zh/resourcepacks/DJ2-${TAG}-补汉材质包-1.12.2.zip" assets/ pack.mcmeta
          cd ../..

          cp resourcepacks/帕秋莉汉化材质包-1.12.2.zip build-zh/resourcepacks/
          cp mods/I18nUpdateMod-*.jar build-zh/mods/
          cp 说明.txt build-zh/

          cd build-zh
          zip -r "../DJ2-汉化-${TAG}.zip" .
          cd ..

      - name: Package IGI 配置压缩包
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p build-igi/config build-igi/mods

          cp -r igi/config/* build-igi/config/
          cp igi/mods/* build-igi/mods/
          cp igi/注意事项.txt build-igi/

          cd build-igi
          zip -r "../DJ2-IGI配置-${TAG}.zip" .
          cd ..

      - name: Commit updated translations
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/ mods/
          git diff --cached --quiet && exit 0
          git commit -m "sync: update translations from ParaTranz (${{ steps.version.outputs.tag }})"
          git push

      - name: Create Release
        if: steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DJ2 汉化 ${{ steps.version.outputs.tag }}"
          body: |
            ## DJ2 汉化补丁 ${{ steps.version.outputs.tag }}
            基于 Divine Journey 2 `${{ steps.version.outputs.dj2_version }}` 版本

            ### 汉化压缩包
            包含：resources 翻译文件、补汉材质包、帕秋莉汉化材质包、i18n 自动汉化模组。

            使用方法：
            1. 解压到游戏整合包版本文件夹覆盖
            2. 进入游戏加载补汉材质包（放在 i18n 材质包下面）
            3. 加载帕秋莉汉化材质包

            ### IGI 配置压缩包
            InGameInfo 屏幕信息显示配置，包含血魔法、RF维度、神秘扭曲等显示。

            使用方法：解压到整合包目录覆盖。

            ---
            翻译协作平台：https://paratranz.cn/projects/15018
          files: |
            DJ2-汉化-${{ steps.version.outputs.tag }}.zip
            DJ2-IGI配置-${{ steps.version.outputs.tag }}.zip

      - name: Cleanup old releases (keep latest 3)
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | \
          while read -r tag; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
